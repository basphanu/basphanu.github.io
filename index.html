<!DOCTYPE html><html class="light" lang="th" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>ALEXANDRIA | Minimal Access</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#4a4540",
                    "secondary": "#8c857d",
                    "background": "#fbf9f4",
                    "surface": "#ffffff",
                    "surface-container": "#f5f2eb",
                    "outline": "#e0ddd5",
                    "on-surface": "#4a4540",
                    "on-surface-variant": "#8c857d"
            },
            "borderRadius": {
                    "DEFAULT": "2px",
                    "lg": "4px",
                    "xl": "8px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "display-lg-mobile": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbf9f4;
            color: #4a4540;
            -webkit-font-smoothing: antialiased;
            min-height: 100dvh;
        }
        
        .action-card {
            transition: all 400ms cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .action-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(74, 69, 64, 0.15);
            background-color: #fcfaf5;
        }

        .action-card:active {
            transform: translateY(0px) scale(0.96);
            transition: all 100ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Light Sweep Effect */
        .action-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transform: skewX(-25deg);
            transition: none;
        }

        .action-card:hover::after {
            left: 150%;
            transition: left 800ms ease-in-out;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .tracking-muji {
            letter-spacing: 0.25em;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-background selection:bg-primary/10">
<!-- TopAppBar - Elegant and Simple -->
<nav class="w-full">
<div class="flex justify-center items-center px-8 py-16 max-w-7xl mx-auto">
<div class="flex flex-col items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl font-light">account_balance</span>
<span class="font-light text-sm tracking-muji text-primary uppercase">Internal system</span>
</div>
</div>
</nav>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-start px-6 pt-12 pb-20 relative">
<div class="z-10 w-full max-w-md text-center">
<div class="mb-24">
<h1 class="text-3xl font-light text-on-surface tracking-muji uppercase">
                    Portal Access
                </h1>
</div>
<div class="flex flex-col gap-8">
<!-- Portal Link 1 -->
<a class="action-card group flex flex-col items-center justify-center py-14 px-8 border border-outline/60 bg-surface-container" href="https://staff-performance-tracking-db.vercel.app/" onclick="handlePortalClick(event)" target="_blank">
<span class="material-symbols-outlined text-primary text-3xl mb-6 opacity-80 group-hover:opacity-100 transition-opacity">monitoring</span>
<span class="text-base font-light text-on-surface tracking-wide">ระบบส่งยอดพนักงาน</span>
<span class="text-[10px] font-medium uppercase tracking-[0.3em] text-on-surface-variant/50 mt-4 group-hover:text-on-surface-variant/80 transition-colors">Staff Performance Tracking</span>
</a>
<!-- Portal Link 2 -->
<a class="action-card group flex flex-col items-center justify-center py-14 px-8 border border-outline/60 bg-surface-container" href="https://easybroker-hub.vercel.app/" onclick="handlePortalClick(event)" target="_blank">
<span class="material-symbols-outlined text-primary text-3xl mb-6 opacity-80 group-hover:opacity-100 transition-opacity">badge</span>
<span class="text-base font-light text-on-surface tracking-wide">ระบบจัดการข้อมูลใบอนุญาต</span>
<span class="text-[10px] font-medium uppercase tracking-[0.3em] text-on-surface-variant/50 mt-4 group-hover:text-on-surface-variant/80 transition-colors">License Management</span>
</a>
</div>
</div>
</main>
<!-- Footer - Minimal Muji Style -->
<footer class="w-full mt-auto">
<div class="flex flex-col items-center px-12 py-16 gap-8 w-full max-w-7xl mx-auto">
<div class="flex flex-wrap justify-center gap-x-12 gap-y-4">
<a class="text-[10px] font-normal uppercase tracking-[0.2em] text-on-surface-variant/60 hover:text-primary transition-all" href="#">Privacy</a>
<a class="text-[10px] font-normal uppercase tracking-[0.2em] text-on-surface-variant/60 hover:text-primary transition-all" href="#">Terms</a>
<a class="text-[10px] font-normal uppercase tracking-[0.2em] text-on-surface-variant/60 hover:text-primary transition-all" href="#">Compliance</a>

</div>
<p class="text-[9px] font-normal uppercase tracking-[0.3em] text-on-surface-variant/40">
                © 2026 phanu management Systems
            </p>
</div>
</footer>
<script>
        function handlePortalClick(event) {
            setTimeout(() => {
                try {
                    window.close();
                } catch (e) {
                    // Silently fail if browser blocks window.close()
                }
            }, 500);
        }
    </script>


</body></html>
