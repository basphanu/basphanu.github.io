<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Portal...</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Inter & Sarabun for Thai support) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
        }
        /* Cosmic Portal Rotations */
        @keyframes orbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes reverse-orbit {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .animate-orbit {
            animation: orbit 8s linear infinite;
        }
        .animate-reverse-orbit {
            animation: reverse-orbit 5s linear infinite;
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        /* Radial Gradient Background */
        .portal-bg {
            background: radial-gradient(circle at center, #111026 0%, #07050f 100%);
        }
    </style>
</head>
<body class="portal-bg min-h-screen text-white flex flex-col justify-between items-center overflow-hidden p-6 selection:bg-indigo-500 selection:text-white">

    <!-- Top Spacer for alignment -->
    <div class="h-10"></div>

    <!-- Main Content Container -->
    <main class="flex flex-col items-center justify-center max-w-md w-full text-center z-10">
        
        <!-- Glowing Cosmic Portal -->
        <div class="relative w-40 h-40 mb-8 flex items-center justify-center animate-float" id="portal-container">
            <!-- Outermost Glow Ring -->
            <div class="absolute inset-0 rounded-full border border-indigo-500/20 blur-xl animate-pulse"></div>
            
            <!-- Outer Spinning Dotted Ring -->
            <div class="absolute w-36 h-36 rounded-full border-2 border-dashed border-indigo-400/30 animate-orbit"></div>
            
            <!-- Middle Spinning Portal Ring with gradients -->
            <div class="absolute w-30 h-30 rounded-full border-t-4 border-b-4 border-l-2 border-r-2 border-transparent border-t-cyan-400 border-b-violet-500 animate-reverse-orbit opacity-80"></div>
            
            <!-- Inner Glowing Aura -->
            <div class="absolute w-24 h-24 rounded-full bg-gradient-to-tr from-violet-600 to-indigo-600 opacity-40 blur-md"></div>
            
            <!-- Core Portal Circle -->
            <div class="absolute w-20 h-20 rounded-full bg-gradient-to-br from-indigo-950 to-slate-950 flex items-center justify-center border border-indigo-500/50 shadow-inner">
                <!-- Inner Portal Icon (elegant SVG) -->
                <svg class="w-8 h-8 text-cyan-400 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11a13.917 13.917 0 00-2.333-7.314c-.018-.03-.036-.059-.053-.089m3.111 19.5a13.916 13.916 0 01-3.111-19.5m6.222 19.5a13.916 13.916 0 003.111-19.5M3.75 12h16.5M12 3a9 9 0 100 18 9 9 0 000-18z"></path>
                </svg>
            </div>
        </div>

        <!-- Dynamic Loading Status Title -->
        <h1 id="main-title" class="text-xl md:text-2xl font-extrabold tracking-wider mb-2 bg-gradient-to-r from-cyan-400 via-indigo-300 to-violet-400 bg-clip-text text-transparent">
            PORTAL CONNECTING
        </h1>
        
        <!-- Status Text -->
        <p id="status-text" class="text-slate-400 text-sm font-light mb-6 h-6 transition-all duration-300">
            กำลังเตรียมการเชื่อมต่อพอร์ทัล...
        </p>

        <!-- Progress Bar Container -->
        <div id="loader-container" class="w-full bg-slate-950/85 p-1.5 rounded-2xl border border-slate-800/80 shadow-2xl mb-6">
            <div class="relative w-full h-2.5 bg-slate-900 rounded-full overflow-hidden">
                <div id="progress-bar" class="absolute top-0 left-0 h-full w-0 rounded-full bg-gradient-to-r from-cyan-500 to-indigo-500 transition-all duration-75 ease-out shadow-[0_0_10px_rgba(34,211,238,0.5)]"></div>
            </div>
            <!-- Percentage Indicator -->
            <div class="flex justify-between items-center px-1 mt-1.5">
                <span class="text-[10px] text-slate-500 uppercase tracking-widest font-mono">Status</span>
                <span id="progress-text" class="text-xs text-cyan-400 font-mono font-bold">0%</span>
            </div>
        </div>

        <!-- Manual Action Button (Always works, never blocked by browser) -->
        <div id="action-container" class="opacity-0 translate-y-2 pointer-events-none transition-all duration-500 ease-out w-full">
            <p class="text-xs text-slate-500 mb-3">หากระบบไม่เปลี่ยนหน้าให้อัตโนมัติใน 3 วินาที กรุณาคลิกปุ่มด้านล่าง</p>
            <a href="https://landing-page-portal-seven.vercel.app/" class="inline-flex justify-center items-center gap-2.5 px-8 py-3.5 bg-gradient-to-r from-cyan-500 to-indigo-600 hover:from-cyan-400 hover:to-indigo-500 text-white font-bold rounded-xl text-sm transition-all duration-200 shadow-lg shadow-indigo-950/50 hover:shadow-cyan-500/20 hover:scale-[1.02] active:scale-95 border border-cyan-400/20 w-full">
                <span>เปิดใช้งานเว็บพอร์ทัลหลัก</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </a>
            <p class="text-[10px] text-slate-600 mt-3 font-mono">รองรับ macOS Dock, iOS Home Screen และเบราว์เซอร์ทุกประเภท 100%</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full flex justify-center items-center gap-2 text-xs text-slate-700 py-4">
        <span class="tracking-widest uppercase font-mono text-[9px]">Universal Security Gateway</span>
    </footer>

    <!-- Redirect & Animation Logic -->
    <script>
        const destination = "https://landing-page-portal-seven.vercel.app/";

        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const statusText = document.getElementById('status-text');
            const actionContainer = document.getElementById('action-container');
            
            // สเตตัสประกอบการโหลด
            const statusPhrases = [
                { limit: 30, text: "กำลังวิเคราะห์ช่องทางเชื่อมต่อ..." },
                { limit: 70, text: "ผ่านการตรวจสอบความปลอดภัยเรียบร้อย..." },
                { limit: 100, text: "กำลังเข้าสู่หน้าหลักพอร์ทัล..." }
            ];

            let progress = 0;
            const duration = 1500; // หมุนโหลด 1.5 วินาทีเพื่อให้ดูสวยงาม
            const intervalStep = 20; 
            const increment = (100 / (duration / intervalStep));

            const timer = setInterval(() => {
                progress += increment;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    onComplete();
                }

                // อัปเดตแถบสีและสเตตัสข้อความ
                progressBar.style.width = `${progress}%`;
                progressText.innerText = `${Math.floor(progress)}%`;

                const phrase = statusPhrases.find(p => progress <= p.limit);
                if (phrase && statusText.innerText !== phrase.text) {
                    statusText.innerText = phrase.text;
                }
            }, intervalStep);

            // เมื่อโหลดเสร็จสมบูรณ์
            function onComplete() {
                // 1. แสดงปุ่มสำรองขึ้นมาทันทีเผื่อกรณีฉุกเฉิน
                actionContainer.classList.remove('opacity-0', 'translate-y-2', 'pointer-events-none');
                actionContainer.classList.add('opacity-100', 'translate-y-0');

                // 2. นำทางโดยใช้การแทนที่หน้าต่างเดิม (In-place replace)
                // วิธีนี้ 100% ปลอดภัยจาก Popup Blocker และหน้าจอโหลดนี้จะหายไปจากประวัติ ไม่ค้างแน่นอน
                setTimeout(() => {
                    window.location.replace(destination);
                }, 100);
            }
        });
    </script>
</body>
</html>
